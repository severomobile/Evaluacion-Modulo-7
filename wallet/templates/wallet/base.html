<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Alke Wallet{% endblock %}</title>

  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />

  <style>
    body { background-color: #f0f4f8; }

    .navbar-brand { font-weight: 700; letter-spacing: 1px; }

    .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); border-radius: 12px; }

    .stat-card { border-left: 4px solid; }
    .stat-card.blue  { border-color: #0d6efd; }
    .stat-card.green { border-color: #198754; }

    .badge-DEP { background-color: #d1e7dd; color: #0f5132; }
    .badge-RET { background-color: #f8d7da; color: #842029; }
    .badge-TRF { background-color: #fff3cd; color: #664d03; }

    .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
  </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="{% url 'dashboard' %}">
      <i class="bi bi-wallet2 me-2"></i>Alke Wallet
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             href="{% url 'dashboard' %}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'usuario' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'usuario_lista' %}">
            <i class="bi bi-people me-1"></i>Usuarios
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'transaccion' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'transaccion_lista' %}">
            <i class="bi bi-arrow-left-right me-1"></i>Transacciones
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Contenido principal ─────────────────────────────────────────────── -->
<main class="container py-4">

  <!-- Mensajes flash -->
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      <i class="bi bi-info-circle me-2"></i>{{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}

</main>

<!-- ── Footer ──────────────────────────────────────────────────────────── -->
<footer class="text-center text-muted py-3 border-top mt-4">
  <small>Alke Wallet &copy; 2024 — Proyecto Módulo 7 · Alkemy</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
